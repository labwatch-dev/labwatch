services:
  labwatch:
    build: .
    container_name: labwatch
    ports:
      - "127.0.0.1:8097:8097"
    environment:
      - ADMIN_SECRET=${ADMIN_SECRET:?Set ADMIN_SECRET in .env or environment}
      - SESSION_SECRET=${SESSION_SECRET:?Set SESSION_SECRET for stable sessions (openssl rand -hex 32)}
      - DATABASE_PATH=/app/data/labwatch.db
      - BASE_URL=${BASE_URL:-http://localhost:8097}
      - RETENTION_HOURS=${RETENTION_HOURS:-168}  # 7 days default
      - PORT=8097
    volumes:
      - labwatch-data:/app/data
    restart: unless-stopped
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8097/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  labwatch-data:
