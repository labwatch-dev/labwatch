services:
  labwatch:
    build: .
    container_name: labwatch
    ports:
      - "8097:8097"
    environment:
      - ADMIN_SECRET=${ADMIN_SECRET:?Set ADMIN_SECRET in .env or environment}
      - SESSION_SECRET=${SESSION_SECRET:-}  # Set to keep sessions across restarts
      - DATABASE_PATH=/app/data/labwatch.db
      - BASE_URL=${BASE_URL:-http://localhost:8097}
      - RETENTION_HOURS=${RETENTION_HOURS:-168}  # 7 days default
      - PORT=8097
    volumes:
      - labwatch-data:/app/data
    restart: unless-stopped

volumes:
  labwatch-data:
