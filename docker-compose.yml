version: "3.8"

services:
  labwatch:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: labwatch
    ports:
      - "8097:8097"
    environment:
      - ADMIN_SECRET=${ADMIN_SECRET:-change-me}
      - DATABASE_PATH=/app/data/labwatch.db
      - BASE_URL=${BASE_URL:-http://localhost:8097}
      - PORT=8097
    volumes:
      - labwatch-data:/app/data
    restart: unless-stopped

volumes:
  labwatch-data:
