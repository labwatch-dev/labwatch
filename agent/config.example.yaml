# labwatch agent configuration
# Copy to /etc/labwatch/config.yaml

# API endpoint — point this to your labwatch server
api_endpoint: "http://your-server:8097/api/v1"

# Admin secret — needed for registration only (labwatch --register)
# After registering, you can remove this line
admin_secret: ""

# Authentication token (obtained during registration)
token: ""

# Lab identifier (auto-assigned during registration)
lab_id: ""

# Hostname reported to the server (defaults to system hostname)
hostname: ""

# Collection interval (minimum 10s)
interval: 60s

# Docker monitoring
docker:
  enabled: true
  socket: "/var/run/docker.sock"

# GPU monitoring (nvidia-smi must be available)
gpu:
  enabled: true

# S.M.A.R.T. disk health monitoring
smart:
  enabled: true

